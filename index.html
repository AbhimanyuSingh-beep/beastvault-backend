<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<meta name="theme-color" content="#080808">
<title>BeastVault | Master Console</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
:root {
  --p:#e11d48;--p-light:#f43f5e;--p-glow:#fb7185;--p-dim:rgba(225,29,72,0.12);
  --cyan:#f59e0b;--orange:#ef4444;--yellow:#fbbf24;--red:#dc2626;--green:#10b981;--yt-red:#ff0000;
  --bg:#080808;--bg2:#0f0f0f;--bg3:#161616;--bg4:#1c1c1c;--surface:rgba(15,15,15,0.9);
  --t1:#f8fafc;--t2:#a0aec0;--t3:#4a5568;--t4:#2d3748;
  --border:rgba(225,29,72,0.12);--border2:rgba(225,29,72,0.35);--glow:0 0 40px rgba(225,29,72,0.12);
  --nav-h:56px;--mob-nav:60px;--sidebar:68px;
  --r-sm:10px;--r-md:16px;--r-lg:20px;--r-xl:28px;
  --touch-min:48px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--t1);min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased;}

/* NEUBRUTALIST ACTION BUTTONS (As Requested) */
.btn-brutal {
  background: var(--p); border: 2px solid #000; box-shadow: 4px 4px 0px #000;
  padding: 10px 18px; color: #fff; font-weight: 800; font-size: 13px;
  cursor: pointer; border-radius: var(--r-sm); display: flex; align-items: center; gap: 8px;
  transition: all 0.1s; text-transform: uppercase;
}
.btn-brutal:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0px #000; }
.btn-brutal:active { transform: translate(2px, 2px); box-shadow: 0px 0px 0px #000; }

/* THOUGHT BOARD STYLING */
.thought-container {
  width: 100%; max-width: 1200px; margin-top: 20px; background: var(--bg3);
  border: 1px solid var(--border2); border-radius: var(--r-lg); overflow: hidden;
}
.thought-header {
  background: var(--yellow); padding: 12px 20px; border-bottom: 2px solid #000;
  display: flex; justify-content: space-between; align-items: center; color: #000;
}
.thought-area {
  width: 100%; min-height: 200px; background: #000; color: var(--green);
  font-family: 'JetBrains Mono', monospace; padding: 20px; border: none;
  outline: none; font-size: 15px; line-height: 1.6; resize: vertical;
}

/* Rest of your provided styles */
.bg-mesh{position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 80% 50% at 20% -10%,rgba(225,29,72,0.10) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 110%,rgba(245,158,11,0.06) 0%,transparent 60%);}
.top-stripe{position:fixed;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--p),var(--cyan),var(--orange),var(--yellow));z-index:1001;}
.topnav{position:fixed;top:0;left:0;right:0;height:var(--nav-h);background:rgba(8,8,8,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:10px;z-index:900;}
.topnav-logo{font-size:18px;font-weight:900;letter-spacing:-1px;cursor:pointer;background:linear-gradient(135deg,#fb7185,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.sidebar{position:fixed;left:0;top:var(--nav-h);bottom:0;width:var(--sidebar);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:12px 0;gap:2px;z-index:800;}
.sbar-item{width:var(--touch-min);height:var(--touch-min);border-radius:var(--r-md);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:var(--t3);font-size:20px;transition:all 0.2s;}
.sbar-item.active{background:var(--p-dim);color:var(--p-glow);border:1px solid var(--border2);}
.main{margin-left:var(--sidebar);padding-top:var(--nav-h);min-height:100dvh;position:relative;z-index:1;}
.page{display:none; padding: 20px;}
.page.active{display:block;}
.vgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;}
.vcard{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;cursor:pointer;transition:transform 0.2s;}
.vcard-thumb{aspect-ratio:16/9;background:var(--bg4);position:relative;overflow:hidden;}
.vcard-thumb img{width:100%;height:100%;object-fit:cover;}
.vcard-body{padding:12px 14px;}
.webcam-container{display:none; position:fixed; top:80px; right:20px; z-index:9999; width:260px; border-radius:12px; box-shadow:0 10px 40px rgba(0,0,0,0.9); border:1px solid rgba(255,255,255,0.2); background:#000; overflow:hidden;}
</style>
</head>
<body>
<div class="bg-mesh"></div>
<div class="top-stripe"></div>

<nav class="topnav">
  <div class="topnav-logo" onclick="showPage('home')">BEAST<span>▸</span>VAULT</div>
  <div style="flex:1"></div>
  <div class="topnav-right" style="display:flex; gap:12px;">
    <button class="btn-brutal" style="background:var(--p-light)" onclick="showPage('upload')">⚡ UNLEASH</button>
    <button class="btn-brutal" style="background:var(--bg3); color:var(--t1);" id="navAuthBtn" onclick="openAuthModal()">👤 SIGN IN</button>
  </div>
</nav>

<aside class="sidebar">
  <div class="sbar-item active" id="sbar-home" onclick="showPage('home')">🏠</div>
  <div class="sbar-item" id="sbar-yt-hub" onclick="showPage('yt-hub')">🌐</div>
  <div class="sbar-item" id="sbar-yt" onclick="showPage('youtube')">📹</div>
</aside>

<main class="main">
  <div id="page-home" class="page active">
    <h1 style="font-size:28px; font-weight:900; margin-bottom:20px;">The Vault <span style="color:var(--p)">.</span></h1>
    <div class="vgrid" id="mainGrid"></div>
  </div>

  <div id="page-player" class="page">
    <div style="max-width:1200px; margin:0 auto; display:flex; flex-direction:column; align-items:center;">
      <div id="videoContainer" style="width:100%; aspect-ratio:16/9; border-radius:var(--r-xl); overflow:hidden; background:#000; border:1px solid var(--border2); position:relative;">
        <video id="playerVideo" playsinline style="width:100%; height:100%;" controls></video>
      </div>

      <div style="width:100%; margin-top:20px; display:flex; justify-content:space-between; align-items:flex-start;">
        <div>
          <h1 id="vTitle" style="font-size:22px; font-weight:800;">Video Title</h1>
          <p id="vUploader" style="color:var(--t2); font-size:14px; margin-top:5px;">@beast</p>
        </div>
        <div style="display:flex; gap:12px;">
            <button class="btn-brutal" style="background:var(--cyan); color:#000;" onclick="copyShareLink()">🔗 SHARE</button>
            <button class="btn-brutal" style="background:var(--yellow); color:#000;" onclick="startVaultLiveReview()">👥 SYNC ROOM</button>
        </div>
      </div>

      <div class="thought-container">
        <div class="thought-header">
          <div style="display:flex; align-items:center; gap:10px;">
              <span style="font-weight:900; font-size:13px; letter-spacing:1px;">📝 THOUGHT BOARD</span>
              <span id="syncIndicator" style="font-family:'JetBrains Mono'; font-size:10px; font-weight:700;">STATIONARY</span>
          </div>
          <button class="btn-brutal" style="background:#fff; color:#000; padding:5px 10px; font-size:10px; box-shadow:2px 2px 0px #000;" onclick="exportThoughtsAsPDF()">💾 EXPORT PDF</button>
        </div>
        <textarea id="thoughtArea" class="thought-area" placeholder="Type notes or Python code here... Everyone in the room sees this live!"></textarea>
      </div>
    </div>
  </div>

  <div id="page-upload" class="page">
    <div style="max-width:600px; margin:0 auto; background:var(--bg3); border:1px solid var(--border); border-radius:var(--r-lg); padding:30px;">
      <h2 style="font-size:24px; font-weight:900; margin-bottom:20px;">Unleash Content ⚡</h2>
      <div style="display:flex; flex-direction:column; gap:15px;">
        <input type="file" id="fileInput" accept="video/*" style="padding:10px; border:1px dashed var(--t3); border-radius:10px;">
        <input type="text" id="upTitle" placeholder="Title..." style="padding:12px; background:var(--bg4); border:1px solid var(--border); border-radius:10px; color:#fff;">
        
        <div style="display:flex; align-items:center; gap:10px; background:rgba(0,0,0,0.2); padding:12px; border-radius:10px;">
          <input type="checkbox" id="upPrivate" style="width:20px; height:20px; cursor:pointer;">
          <label for="upPrivate" style="font-weight:700; cursor:pointer;">PRIVATE VAULT (HIDDEN FROM FEED)</label>
        </div>

        <button class="btn-brutal" id="publishBtn" onclick="publishVideo()" style="width:100%; justify-content:center;">🚀 PUBLISH TO VAULT</button>
      </div>
    </div>
  </div>
</main>

<div id="webcamContainer" class="webcam-container">
  <div style="padding:8px 15px; background:var(--p); border-bottom:1px solid #000; display:flex; justify-content:space-between; align-items:center; color:#fff; font-weight:900;">
    <div style="display:flex; align-items:center; gap:8px;">
        <span id="memberBadge" style="background:#000; color:#fff; padding:2px 6px; border-radius:50px; font-size:10px;">1</span>
        <span style="font-size:11px;">LIVE CONSOLE</span>
    </div>
    <button onclick="endCall()" style="background:none; border:none; color:#fff; cursor:pointer; font-weight:900;">✕</button>
  </div>
  <video id="remoteVideo" style="width:100%; background:#111;" autoplay playsinline></video>
  <video id="localVideo" style="width:30%; position:absolute; bottom:8px; right:8px; border:1px solid #fff; border-radius:8px;" autoplay playsinline muted></video>
</div>

<div id="toast" style="position:fixed; bottom:40px; left:50%; transform:translateX(-50%); background:#000; color:#fff; padding:15px 30px; border-radius:50px; font-weight:800; border:2px solid var(--p); display:none; z-index:10000;"></div>

<script>
const API = 'https://beastvault-backend.onrender.com/api';
const socket = io(API.replace('/api', ''));
let allVideos = [], currentRoom = null, currentVideoId = null;

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.sbar-item').forEach(i => i.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  const sbar = document.getElementById('sbar-' + id);
  if(sbar) sbar.classList.add('active');
  if (id === 'home') fetchVideos();
  window.scrollTo(0,0);
}

async function fetchVideos() {
  const r = await fetch(API + '/videos');
  const d = await r.json();
  allVideos = d.videos || [];
  // Filter out Private videos for the public feed
  const publicVids = allVideos.filter(v => v.is_private !== true);
  renderGrid(publicVids);
}

function renderGrid(vids) {
  const g = document.getElementById('mainGrid');
  if(!vids.length) { g.innerHTML = "<p>Vault is empty...</p>"; return; }
  g.innerHTML = vids.map(v => `
    <div class="vcard" onclick="openPlayer('${v.id}')">
      <div class="vcard-thumb"><img src="${v.thumbnail_url || ''}"></div>
      <div class="vcard-body">
        <div style="font-weight:700; font-size:14px;">${v.title}</div>
        <div style="font-size:11px; color:var(--t2); margin-top:4px;">BY @${v.uploader || 'beast'}</div>
      </div>
    </div>`).join('');
}

async function openPlayer(id) {
  const v = allVideos.find(x => x.id == id);
  if (!v) {
      // Direct fetch if not in the grid (for deep links)
      try {
          const resp = await fetch(`${API}/videos/${id}`);
          const data = await resp.json();
          if (data.video) { allVideos.push(data.video); return openPlayer(id); }
      } catch(e) { return; }
  }
  currentVideoId = id;
  showPage('player');
  document.getElementById('vTitle').textContent = v.title;
  const vid = document.getElementById('playerVideo');
  vid.src = v.hls_url;
  vid.play();
}

/* SYNC & THOUGHT BOARD LOGIC */
const thoughtArea = document.getElementById('thoughtArea');
const indicator = document.getElementById('syncIndicator');

thoughtArea.addEventListener('input', () => {
  if (currentRoom) {
    socket.emit('sync-thoughts', { room: currentRoom, content: thoughtArea.value });
    indicator.textContent = "SYNCING...";
  }
});

socket.on('sync-thoughts', (data) => {
  thoughtArea.value = data.content;
  indicator.textContent = "REMOTE UPDATED";
  setTimeout(() => { indicator.textContent = "STATIONARY"; }, 1200);
});

socket.on('room-metrics', (data) => {
    document.getElementById('memberBadge').textContent = data.members;
});

function exportThoughtsAsPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const content = thoughtArea.value;
    if(!content.trim()) return showToast("⚠️ NO NOTES FOUND");
    doc.setFont("helvetica", "bold"); doc.text("BEASTVAULT NOTES", 20, 20);
    doc.setFont("courier", "normal"); doc.text(doc.splitTextToSize(content, 170), 20, 40);
    doc.save(`BeastVault_Notes.pdf`);
    showToast("📄 PDF EXPORTED!");
}

function copyShareLink() {
  if (!currentVideoId) return;
  const link = `${window.location.origin}${window.location.pathname}?video=${currentVideoId}${currentRoom ? '&room='+currentRoom : ''}`;
  navigator.clipboard.writeText(link);
  showToast("🔗 LINK COPIED!");
}

async function startVaultLiveReview() {
  if (!currentRoom) currentRoom = Math.random().toString(36).substring(7);
  document.getElementById('webcamContainer').style.display = 'block';
  socket.emit('join-room', currentRoom);
  copyShareLink();
}

async function publishVideo() {
  const file = document.getElementById('fileInput').files[0];
  const title = document.getElementById('upTitle').value;
  const isPrivate = document.getElementById('upPrivate').checked;
  if(!file || !title) return showToast("⚠️ FILL FIELDS");

  const btn = document.getElementById('publishBtn');
  btn.innerHTML = "⏳ UPLOADING...";
  const fd = new FormData();
  fd.append('video', file); fd.append('title', title); fd.append('is_private', isPrivate);

  try {
    const r = await fetch(API + '/videos/upload', { method: 'POST', body: fd });
    if(r.ok) { showToast("🦁 UNLEASHED!"); showPage('home'); }
  } catch(e) { showToast("❌ FAILED"); }
  finally { btn.innerHTML = "🚀 PUBLISH TO VAULT"; }
}

function showToast(m) {
  const t = document.getElementById('toast');
  t.textContent = m; t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}

function endCall() { document.getElementById('webcamContainer').style.display = 'none'; }

/* URL DEEP LINKS */
window.addEventListener('DOMContentLoaded', async () => {
  await fetchVideos();
  const urlParams = new URLSearchParams(window.location.search);
  const videoId = urlParams.get('video'), roomId = urlParams.get('room');
  if (videoId) { await openPlayer(videoId); if (roomId) { currentRoom = roomId; socket.emit('join-room', currentRoom); document.getElementById('webcamContainer').style.display = 'block'; } }
});
</script>
</body>
</html>
