<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BeastVault // Advanced Video Engine</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
  :root { 
    --accent: #10b981; 
    --bg: #050505; 
    --sidebar: #0a0a0a; 
    --text: #fdfdfd; 
    --text-muted: #888; 
    --border: #1f1f1f;
    --card: #121212;
    --nav-bg: rgba(5,5,5,0.8);
  }

  [data-theme="light"] {
    --bg: #f9fafb;
    --sidebar: #ffffff;
    --text: #111827;
    --text-muted: #6b7280;
    --border: #e5e7eb;
    --card: #ffffff;
    --nav-bg: rgba(249,250,251,0.8);
  }

  * { box-sizing: border-box; transition: background 0.3s, color 0.3s, border-color 0.3s; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow-x: hidden; }

  /* --- HEADER --- */
  nav { height: 60px; background: var(--nav-bg); backdrop-filter: blur(15px); display: flex; align-items: center; padding: 0 24px; position: fixed; width: 100%; top: 0; z-index: 1000; border-bottom: 1px solid var(--border); justify-content: space-between; }
  .logo { font-family: 'JetBrains Mono'; font-weight: 800; font-size: 20px; cursor: pointer; letter-spacing: -1px; }
  .logo span { color: var(--accent); }

  .search-wrap { flex: 0 1 500px; display: flex; align-items: center; }
  .search-input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 40px; padding: 8px 20px; color: var(--text); outline: none; }
  .search-input:focus { border-color: var(--accent); }

  .nav-right { display: flex; gap: 12px; align-items: center; }
  .btn-primary { background: var(--accent); color: #000; border: none; padding: 8px 18px; border-radius: 40px; font-weight: 700; cursor: pointer; font-size: 14px; }
  .btn-theme { background: var(--border); color: var(--text); border: none; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  
  /* --- LAYOUT --- */
  .layout { display: flex; padding-top: 60px; }
  aside { width: 240px; background: var(--sidebar); height: 100vh; position: fixed; padding: 15px; border-right: 1px solid var(--border); }
  .nav-item { padding: 10px 15px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; color: var(--text-muted); display: flex; align-items: center; gap: 12px; transition: 0.2s; }
  .nav-item:hover, .nav-item.active { background: var(--card); color: var(--text); border: 1px solid var(--border); }

  main { margin-left: 240px; flex: 1; padding: 30px; }

  /* --- PAGES --- */
  .page { display: none; }
  .page-active { display: block; }

  /* --- VIDEO GRID --- */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; }
  .card { cursor: pointer; background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); transition: 0.3s; padding-bottom: 12px; }
  .card:hover { border-color: var(--accent); transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
  .thumb { aspect-ratio: 16/9; background: #000; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .thumb img { width: 100%; height: 100%; object-fit: cover; }
  .badge { position: absolute; top: 8px; left: 8px; background: #000; border: 1px solid var(--accent); color: var(--accent); font-size: 10px; font-weight: 800; padding: 2px 6px; border-radius: 4px; }

  .card-body { padding: 12px; }
  .v-title { font-weight: 700; font-size: 15px; margin-bottom: 4px; line-height: 1.4; }
  .v-meta { color: var(--text-muted); font-size: 13px; }

  /* --- PLAYER --- */
  .player-box { width: 100%; border-radius: 16px; overflow: hidden; background: #000; border: 1px solid var(--border); }
  .player-box video { width: 100%; display: block; aspect-ratio: 16/9; }
  .player-header { display: flex; justify-content: space-between; align-items: flex-start; margin-top: 24px; }
  .btn-purge { background: transparent; color: #ff4d4d; border: 1px solid #ff4d4d; padding: 8px 16px; border-radius: 40px; cursor: pointer; font-weight: 700; }
</style>
</head>
